name: test-dotfiles-arch

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Prep base deps
        shell: bash
        run: |
          set -euo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm git curl sudo
          # Create a non-root build user for AUR/makepkg (makepkg refuses root)
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Expose HOME to builduser for dotfiles checkout
          chmod o+rx /root
          # Ensure real sudo is usable (not replaced with shim) so builduser
          # can call 'sudo pacman' from inside makepkg -si
          chmod 4755 /usr/bin/sudo || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run base initialize (curl)
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://raw.githubusercontent.com/BartSte/dotfiles/master/dotfiles/initialize
          bash ./initialize
          rm ./initialize

      - name: Checkout arch layer as bare repo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$HOME/dotfiles-arch.git"
          git clone --bare "$GITHUB_WORKSPACE" "$HOME/dotfiles-arch.git"
          mkdir -p "$HOME/dotfiles-arch"
          git --work-tree="$HOME/dotfiles-arch" --git-dir="$HOME/dotfiles-arch.git" checkout -f

      - name: Run dotfiles-arch main
        shell: bash
        run: |
          set -euo pipefail
          ~/dotfiles-arch/main

      - name: Assertions
        shell: bash
        run: |
          set -euo pipefail
          test -f "$HOME/.dotfiles_config.sh"
          command -v git
          command -v pacman
          test -e "$HOME/dotfiles-arch/main"
